name: ArXiv Weekly Digest + KB Integration

on:
  schedule:
    - cron: '0 8 * * 5'   # Friday 8:00am UTC
  workflow_dispatch:

concurrency:
  group: arxiv-integration
  cancel-in-progress: false

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Run ArXiv scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .scripts/arxiv-scraper.py

      - name: Configure Git
        run: |
          git config user.email "arxiv-bot@github.com"
          git config user.name "ArXiv Digest Bot"

      - name: Commit and push digest
        run: |
          git add raw/arxiv-papers/
          git diff --cached --quiet || (git commit -m "docs: add ArXiv weekly digest (Claude-scored KB relevance)" && git push origin main)

  deep-dive-analysis:
    needs: generate-digest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with main (pick up scraper's commit)
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai beautifulsoup4

      - name: Run deep-dive analysis
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python .scripts/arxiv_deep_dive.py

      - name: Configure Git
        run: |
          git config user.email "arxiv-bot@github.com"
          git config user.name "ArXiv Bot"

      - name: Commit and push proposals JSON
        env:
          COMMIT_DATE: ${{ github.run_id }}
        run: |
          git add raw/arxiv-proposals/
          if ! git diff --cached --quiet; then
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "docs(arxiv): add deep-dive proposals $DATE"
            git pull --rebase origin main
            git push origin main
          fi

  kb-integration:
    needs: deep-dive-analysis
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with main (pick up proposals from deep-dive)
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Configure Git
        run: |
          git config user.email "arxiv-bot@github.com"
          git config user.name "ArXiv Bot"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run KB integration
        run: python .scripts/arxiv_integrate.py
        # Per-paper commits + push happen inside the script
