name: ArXiv Weekly Digest

on:
  schedule:
    # Run every Friday at 8:00 AM UTC
    - cron: '0 8 * * 5'

  # Allow manual triggering
  workflow_dispatch:

jobs:
  generate-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests anthropic

      - name: Run ArXiv scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python .scripts/arxiv-scraper.py

      - name: Configure Git
        run: |
          git config user.email "arxiv-bot@github.com"
          git config user.name "ArXiv Digest Bot"

      - name: Commit and push digest
        run: |
          git add raw/arxiv-papers/ || true
          git diff --cached --quiet || (git commit -m "docs: add ArXiv weekly digest (Claude-scored KB relevance)" && git push origin main)
